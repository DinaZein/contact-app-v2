<mat-card class="contact-card">
  <mat-card-content>

    <div class="contact-header">
      <h3>{{ contact.name }}</h3>
    </div>

    <div class="contact-info">
      <p>📧 {{ contact.email }}</p>
      <p>📞 {{ contact.phone }}</p>
    </div>

  </mat-card-content>

  <mat-card-actions align="end">
    <button mat-button color="primary" (click)="onEdit()">Edit</button>
    <button mat-button color="warn" (click)="onDelete()">Delete</button>
  </mat-card-actions>
</mat-card>
